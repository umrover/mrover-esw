services:
  influxdb:
    image: influxdb:1.11.8
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=logger_db
      - INFLUXDB_HTTP_AUTH_ENABLED=true
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=password
      - INFLUXDB_READ_USER=grafana
      - INFLUXDB_READ_USER_PASSWORD=password
      - INFLUXDB_WRITE_USER=logger
      - INFLUXDB_WRITE_USER_PASSWORD=password
    volumes:
      - influx_storage:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 15s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=mrover
      - GF_SECURITY_ADMIN_PASSWORD=password
    depends_on:
      influxdb:
        condition: service_healthy
    volumes:
      - grafana_storage:/var/lib/grafana
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      retries: 5

  # can_logger:
  #   build:
  #     context: ./can_code
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   environment:
  #     - INFLUXDB_URL=http://influxdb:8086
  #     - INFLUXDB_DB=logger_db
  #     - INFLUXDB_USER=logger
  #     - INFLUXDB_PASSWORD=password
  #   depends_on:
  #     influxdb:
  #       condition: service_healthy
  #   volumes:
  #     - ./can_logger/logs:/app/logs

  can_logger:
    image: can_logger_image
    container_name: can_logger_instance
    restart: unless-stopped
    environment:
       - INFLUXDB_URL=http://influxdb:8086
       - INFLUXDB_DB=logger_db
       - INFLUXDB_USER=logger
       - INFLUXDB_PASSWORD=password
    depends_on:
      influxdb:
        condition: service_healthy
    volumes:
       - ./can_logger/logs:/app/logs

# DEFINE THE VOLUMES HERE
volumes:
  influx_storage:
  grafana_storage: