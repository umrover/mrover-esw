name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:

  generate-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.load.outputs.dirs }}
    steps:
      - uses: actions/checkout@v4

      - id: load
        run: |
          {
            echo "dirs<<EOF"
            cat ci.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  docker-image:
    uses: ./.github/workflows/docker.yml

  style:
    needs: docker-image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/arm-gnu:${{ needs.docker-image.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Create python venv
        run: |
          cmake -S ./tools -B ./tools/build
          cmake --build ./tools/build --target python_env_ready
          rm -rf tools/build/

      - name: Run style (format and lint)
        run: |
          . tools/venv/bin/activate
          chmod +x scripts/style.sh
          ./scripts/style.sh --format --lint

  test-build:
    needs:
      - docker-image
      - generate-test-matrix
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/arm-gnu:${{ needs.docker-image.outputs.image_tag }}

    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJSON(needs.generate-test-matrix.outputs.dirs) }}
        preset: [ Debug, Release ]

    steps:
      - name: Checkout repo and submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set parallelism
        run: echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV

      - name: Build ${{ matrix.dir }} (${{ matrix.preset }})
        run: ./scripts/build.sh --src ${{ matrix.dir }} --preset ${{ matrix.preset }}

