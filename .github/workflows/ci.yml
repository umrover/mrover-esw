name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.arm-gnu
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/arm-gnu:13.3
            ghcr.io/${{ github.repository }}/arm-gnu:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  test:
    needs: build-image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/arm-gnu:13.3

    strategy:
      fail-fast: false
      matrix:
        dir: [ "test/fdcan" ]
        preset: [ Debug, Release ]

    steps:
      - uses: actions/checkout@v4

      - name: Set parallelism
        run: echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV

      - name: Configure ${{ matrix.dir }} (${{ matrix.preset }})
        working-directory: ${{ github.workspace }}/${{ matrix.dir }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build ${{ matrix.dir }} (${{ matrix.preset }})
        working-directory: ${{ github.workspace }}/${{ matrix.dir }}
        run: cmake --build --preset ${{ matrix.preset }}

