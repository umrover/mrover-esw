name: docker

on:
  workflow_call:
    outputs:
      image_tag:
        description: "tag of the image to use"
        value: ${{ jobs.build-docker-image.outputs.image_tag }}

permissions:
  contents: read
  packages: write

jobs:
  build-docker-image:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if Docker rebuild is necessary
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            image:
              - 'Dockerfile.arm-gnu'
              - '.github/workflows/ci.yml'

      - name: Login to ghcr
        uses: docker/login-action@v3
        if: steps.changed.outputs.image == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3
        if: steps.changed.outputs.image == 'true'

      - name: Build and push
        uses: docker/build-push-action@v6
        if: steps.changed.outputs.image == 'true'
        with:
          context: .
          file: ./Dockerfile.arm-gnu
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/arm-gnu:13.3
            ghcr.io/${{ github.repository }}/arm-gnu:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - id: tag
        run: echo "tag=13.3" >> "$GITHUB_OUTPUT"
